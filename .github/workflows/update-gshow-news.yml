name: Update Gshow BBB News

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-gshow-news
  cancel-in-progress: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Next app
        run: |
          npm run dev > next.log 2>&1 &
          echo $! > next.pid

      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Next did not start in time"
          cat next.log || true
          exit 1

      - name: Run news update
        run: |
          curl --retry 3 --retry-delay 2 --retry-connrefused -fsS \
            http://127.0.0.1:3000/api/gshow-bbb26-news \
            | tee update-response.json

      - name: Validate output files
        run: |
          test -f tools/bbb-hosting/public/noticiasbbb.json
          test -f tools/bbb-hosting/public/noticiasbbb-latest.json

          jq empty tools/bbb-hosting/public/noticiasbbb.json
          jq empty tools/bbb-hosting/public/noticiasbbb-latest.json

      - name: Stop Next app
        if: always()
        run: |
          if [ -f next.pid ]; then
            kill "$(cat next.pid)" || true
            sleep 2
            kill -9 "$(cat next.pid)" || true
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gshow-news-debug
          path: |
            next.log
            update-response.json
          if-no-files-found: ignore

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tools/bbb-hosting/public/noticiasbbb.json tools/bbb-hosting/public/noticiasbbb-latest.json

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "chore: update gshow BBB news"

          if ! git pull --rebase origin main; then
            echo "Rebase failed; aborting this run"
            git rebase --abort || true
            exit 1
          fi

          git push
