name: Update Casa do Patrao Conteudos

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-casa-do-patrao-conteudos
  cancel-in-progress: true

jobs:
  update-conteudos:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Casa do Patrao conteudos JSON
        run: npm run update:casa-patrao-conteudos

      - name: Validate output files
        run: |
          test -f tools/bbb-hosting/public/casa-do-patrao-conteudos.json
          test -f tools/bbb-hosting/public/casa-do-patrao-conteudos-latest.json

          jq empty tools/bbb-hosting/public/casa-do-patrao-conteudos.json
          jq empty tools/bbb-hosting/public/casa-do-patrao-conteudos-latest.json

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tools/bbb-hosting/public/casa-do-patrao-conteudos.json tools/bbb-hosting/public/casa-do-patrao-conteudos-latest.json

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "chore: update casa do patrao conteudos"
          git push
